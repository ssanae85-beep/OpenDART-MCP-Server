name: Update corp codes

# data/corp-codes.json is the name → corp_code index the search tool reads.
# It is a snapshot: newly listed companies stay unfindable until it is rebuilt.
#
# Requires an OPENDART_API_KEY repository secret
# (Settings → Secrets and variables → Actions → New repository secret).

on:
  schedule:
    # Mondays 06:00 KST (Sundays 21:00 UTC)
    - cron: "0 21 * * 0"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-corp-codes
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Check the API key secret is present
        env:
          OPENDART_API_KEY: ${{ secrets.OPENDART_API_KEY }}
        run: |
          if [ -z "$OPENDART_API_KEY" ]; then
            echo "::error::OPENDART_API_KEY secret is not set. Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi

      - run: npm ci

      # The script validates before writing: it rejects a short list, a large
      # shrink, or codes that lost their leading zeros, and exits non-zero
      # without touching the file. A failure here means nothing was committed.
      - name: Rebuild corp-codes.json
        env:
          OPENDART_API_KEY: ${{ secrets.OPENDART_API_KEY }}
        run: npm run update-corp-codes

      - name: Commit if changed
        run: |
          if git diff --quiet -- data/corp-codes.json; then
            echo "No change since the last run." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          node -e '
            const d = require("./data/corp-codes.json");
            const listed = d.filter(e => e.stock_code);
            const fs = require("fs");
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, [
              "### corp-codes.json updated",
              "",
              "| | |",
              "|---|---|",
              `| 전체 기업 | ${d.length.toLocaleString()} |`,
              `| 상장사 | ${listed.length.toLocaleString()} |`,
              `| 0으로 시작하는 종목코드 | ${listed.filter(e => e.stock_code.startsWith("0")).length.toLocaleString()} |`,
              "",
            ].join("\n"));
          '

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/corp-codes.json
          git commit -m "chore: update corp codes ($(date -u +%Y-%m-%d))"
          git push
